<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Editor</title>
    
    <!-- 仅保留核心样式引用 -->
    <link rel="stylesheet" href="assets/code_view.css">
    
    <!-- Qt 桥接脚本（用于本地 Python 通信，网页版会自动忽略） -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        /* 基础布局：确保编辑器占满全屏 */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #282c34; /* 防止 JS 加载前的白屏 */
            overflow: hidden;
        }
        #editor-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- 唯一的 DOM 挂载点 -->
    <div id="editor-container"></div>

    <!-- 仅保留核心 JS 引用 -->
    <!-- 路径指向 build.js 输出的默认位置 -->
    <script type="module" src="assets/bundle_editor.js"></script>

    <!-- 按钮区 -->
    <button id="init-btn" onclick="initEditorWithExample()" style="
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 9999;
    padding: 5px 10px;
    background: rgba(65, 65, 65, 0.5);
    color: #fff;
    border: 1px solid #707070;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: opacity 0.3s;
    opacity: 0.3;
" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.3'">
    初始化模板
    </button>

    <script>
        function initEditorWithExample() {
            const EXAMPLE_CODE = `[[include :scp-wiki:theme:peroxide]]\n\n[[div class="container"]]\n在此输入你的内容...\n[[/div]]`;
            
            // 确保 window.WikidotEditor 已经加载并暴露了实例
            // 假设你在 editor.js 中将 editorView 暴露到了全局或者 window.WikidotEditor 下
            if (window.editorInstance) {
                const view = window.editorInstance;
                view.dispatch({
                    changes: {
                        from: 0,
                        to: view.state.doc.length,
                        insert: EXAMPLE_CODE
                    },
                    selection: { anchor: 0 }
                });
                console.log("编辑器已手动初始化");
            } else {
                alert("编辑器尚未就绪，请稍后再试");
            }
        }
    </script>
</body>
</html>
