<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Editor</title>
    <link rel="stylesheet" href="assets/code_view.css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #282c34;
            overflow: hidden;
            font-family: var(--p-font-monospace, 'Sarasa Gothic SC', monospace);
        }
        #editor-container {
            width: 100%;
            height: 100%;
            z-index: 1; /* 底层 */
        }

        /* 强制置顶的按钮区 */
        .editor-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999; /* 确保在最顶层 */
            display: flex;
            gap: 15px;
        }

        .ctrl-btn {
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px #ffffff;
            transition: all 0.1s;
        }

        .ctrl-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #ffffff;
        }

        .btn-clear {
            color: #ff4500;
            border-color: #ff4500;
            box-shadow: 4px 4px 0px #ff4500;
        }
        .btn-clear:hover { box-shadow: 2px 2px 0px #ff4500; }
    </style>
</head>
<body>

    <div class="editor-controls">
        <button class="ctrl-btn" onclick="handleAction('init')">INITIALIZE</button>
        <button class="ctrl-btn btn-clear" onclick="handleAction('clear')">CLEAR ALL</button>
    </div>

    <div id="editor-container"></div>

    <script type="module" src="assets/bundle_editor.js"></script>

    <script>
        // 定义模板
        const EXAMPLE_CODE = `[[include :scp-wiki-cn:theme:peroxide]]

[[div class="container"]]
在此输入内容...
[[/div]]`;

        function handleAction(type) {
            // 注意：这里用的是你在 editor.js 里挂载的 window.editorInstance
            const view = window.editorInstance;
            
            if (!view) {
                alert("编辑器尚未就绪，请稍等 bundle_editor.js 加载完毕");
                return;
            }

            let content = "";
            if (type === 'init') {
                content = EXAMPLE_CODE;
            } else if (type === 'clear') {
                if (!confirm("确定要清空所有内容吗？")) return;
                content = "";
            }

            view.dispatch({
                changes: { from: 0, to: view.state.doc.length, insert: content },
                selection: { anchor: 0 }
            });
        }
    </script> 
    </body>
</html>
