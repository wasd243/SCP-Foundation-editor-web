<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Editor</title>
    
    <!-- 仅保留核心样式引用 -->
    <link rel="stylesheet" href="code_view.css">
    
    <!-- Qt 桥接脚本（用于本地 Python 通信，网页版会自动忽略） -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        /* 基础布局：确保编辑器占满全屏 */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #282c34; /* 防止 JS 加载前的白屏 */
            overflow: hidden;
        }
        #editor-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- 唯一的 DOM 挂载点 -->
    <div id="editor-container"></div>

    <!-- 仅保留核心 JS 引用 -->
    <!-- 路径指向 build.js 输出的默认位置 -->
    <script type="module" src="assets/bundle_editor.js"></script>

</body>
</html>
