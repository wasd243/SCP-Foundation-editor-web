<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Editor - Web Edition</title>
    <link rel="stylesheet" href="code_view.css">
    <style>
        :root {
            --sidebar-width: 260px;
            --header-height: 50px;
            --accent-color: #e06c75;
            --bg-dark: #1e1e1e;
            --bg-lighter: #282c34;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: #abb2bf;
            overflow: hidden;
        }

        /* 整体布局 */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #181a1f;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .sidebar-header img {
            width: 60px;
            filter: invert(1);
            opacity: 0.8;
        }

        .nav-list {
            padding: 10px;
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .nav-item:hover {
            background: #2c313a;
        }

        .nav-item.active {
            background: var(--accent-color);
            color: white;
        }

        /* 主编辑区 */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 工具栏 */
        .toolbar {
            height: var(--header-height);
            background-color: var(--bg-lighter);
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #181a1f;
            justify-content: space-between;
        }

        .tool-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: #3a3f4b;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #4b5262;
        }

        .btn-primary {
            background: var(--accent-color);
        }

        /* 编辑容器 */
        #editor-container {
            flex-grow: 1;
            position: relative;
        }

        /* 状态栏 */
        .status-bar {
            height: 25px;
            background: #21252b;
            font-size: 12px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-top: 1px solid #181a1f;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <!-- 侧边栏：可以在这里放文件列表或模板 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div style="font-weight: bold; color: white; letter-spacing: 1px;">SCP EDITOR</div>
                <div style="font-size: 10px; margin-top: 4px; opacity: 0.5;">WEB v1.0.0</div>
            </div>
            <ul class="nav-list">
                <li class="nav-item active">📝 当前文档</li>
                <li class="nav-item">📚 常用模板</li>
                <li class="nav-item">🎨 主题设置</li>
                <li class="nav-item">⚙️ 偏好设置</li>
            </ul>
        </aside>

        <!-- 主界面 -->
        <main class="main-content">
            <!-- 工具栏 -->
            <header class="toolbar">
                <div class="tool-group">
                    <button class="btn" onclick="insertTag('**')">加粗</button>
                    <button class="btn" onclick="insertTag('//')">斜体</button>
                    <button class="btn" onclick="insertTag('[[=]]')">居中</button>
                </div>
                <div class="tool-group">
                    <button class="btn btn-primary" id="save-btn">保存到本地</button>
                    <button class="btn" id="preview-btn">预览</button>
                </div>
            </header>

            <!-- 编辑器核心 -->
            <div id="editor-container"></div>

            <!-- 底部状态栏 -->
            <footer class="status-bar">
                <span id="char-count">字符: 0</span>
                <span style="margin-left: 20px;">模式: Wikidot / Markdown</span>
            </footer>
        </main>
    </div>

    <!-- 加载编辑器 -->
    <script type="module">
        // 注意：这里需要你之前构建好的 bundle_editor.js
        import { startEditor } from './assets/bundle_editor.js';
        
        window.addEventListener('DOMContentLoaded', () => {
            const editor = startEditor();
            
            // 实时字符统计逻辑
            window.addEventListener('editorContentChanged', (e) => {
                document.getElementById('char-count').innerText = `字符: ${e.detail.content.length}`;
            });
        });

        // 简单的插入逻辑示例
        window.insertTag = (tag) => {
            console.log("插入标签: " + tag);
            // 这里可以通过 window.WikidotEditor 实例进行交互
        };
    </script>
</body>
</html>
