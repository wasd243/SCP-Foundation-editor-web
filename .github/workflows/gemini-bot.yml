name: Gemini Deep Code Reviewer
on:
  workflow_dispatch: # 建议手动触发，因为全量扫描比较费 Token
  push:
    branches: [ main ]

jobs:
  deep-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get App Token
        id: get_token
        uses: peter-evans/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Prepare Code for Review
        run: |
          # 扫描项目中的核心文件（可以根据需要修改扩展名）
          # 这里排除掉 node_modules 和 .git 等无关目录
          echo "PROJECT_CONTENT<<EOF" >> $GITHUB_ENV
          find . -maxdepth 2 -not -path '*/.*' -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.vue" \) | xargs -I {} sh -c 'echo "FILE: {}"; cat -n {}; echo "\n---"' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Gemini Multi-File Review
        run: |
          # 构建深度审查的 Prompt
          PROMPT="你现在是一位资深的 Full Stack 工程师。请审查以下代码。
          要求：
          1. 找出潜在的 Bug、性能问题或不规范的写法。
          2. 必须指明具体的文件名和行号。
          3. 使用中英双语输出报告 (Bilingual report in Chinese and English)。
          4. 格式要求：使用 Markdown 表格或列表。
          
          代码内容如下：
          ${{ env.PROJECT_CONTENT }}"

          # 发送请求
          RESPONSE=$(curl https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }} \
              -H 'Content-Type: application/json' \
              -X POST \
              -d "{
                \"contents\": [{
                  \"parts\":[{\"text\": $(echo "$PROMPT" | jq -aRs .)}]
                }]
              }")

          # 保存审查报告
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > AI_Code_Review.md

      - name: Commit Review Report
        run: |
          git config --local user.email "gemini-bot[bot]@users.noreply.github.com"
          git config --local user.name "Gemini-Bot"
          git add AI_Code_Review.md
          git commit -m "docs: Gemini Deep Code Review Report generated" || echo "No issues found"
          git push
        env:
          GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}
