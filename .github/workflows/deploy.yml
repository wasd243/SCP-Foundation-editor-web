name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.js'
      - '**.html'
      - '**.css'
      - 'package.json'
      - 'src/**.grammar'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Lezer Parser
        run: npx lezer-generator src/wikidot.grammar -o src/parser.js
      
      - name: Build project
        run: npm run build
        
      - name: Prepare Public Directory
        # 统一输出到根目录，避免 develop 分支发布到 /dev 路径
        run: |
          mkdir -p public

          # 1. 若有 dist 产物，先拷贝
          if [ -d "dist" ]; then
            cp -r dist/* public/
          fi

          # 2. 强制将入口页面放到站点根目录
          [ -f "index.html" ] && cp index.html public/
          [ -f "test.html" ] && cp test.html public/

          # 3. 拷贝静态资源
          if [ -d "assets" ]; then
            mkdir -p public/assets
            cp -r assets/* public/assets/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: .
