name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '**.js'
      - '**.html'
      - '**.css'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 部署当前目录，但排除掉所有开发环境的文件
          publish_dir: ./
          exclude_assets: |
            node_modules/
            .github/
            .git/
            build.js
            editor.js
            completion.js
            color_preview.js
            color_widgets.js
            package.json
            package-lock.json
            .gitignore
            *.py
            README.md
          publish_branch: gh-pages