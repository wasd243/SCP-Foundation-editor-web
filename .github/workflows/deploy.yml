name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '**.js'
      - '**.html'
      - '**.css'
      - 'package.json'
      - 'src/**.grammar'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Lezer Parser
        run: npx lezer-generator src/wikidot.grammar -o src/parser.js
      
      - name: Build project
        run: npm run build
        
      - name: Prepare Public Directory
        run: |
          mkdir -p public/assets
          cp index.html public/
          # 复制测试页（如果存在）
          if [ -f "test.html" ]; then
            cp test.html public/
          fi
          if [ -d "assets" ]; then
            cp -r assets/* public/assets/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 部署新准备的 public 目录
          publish_dir: ./public
          publish_branch: gh-pages